<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serbian Learning App</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #1a5276;
  --primary-light: #2980b9;
  --accent: #e74c3c;
  --success: #27ae60;
  --warning: #f39c12;
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #dcdde1;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
nav {
  background: var(--primary);
  padding: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.nav-title {
  color: white;
  font-size: 1.1rem;
  font-weight: 700;
  padding: 12px 20px 4px;
  letter-spacing: 0.5px;
}

.nav-tabs {
  display: flex;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.nav-tabs::-webkit-scrollbar { display: none; }

.nav-tab {
  background: none;
  border: none;
  color: rgba(255,255,255,0.65);
  padding: 10px 16px;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.nav-tab:hover { color: rgba(255,255,255,0.9); }
.nav-tab.active {
  color: white;
  border-bottom-color: var(--warning);
}

/* MAIN */
main {
  max-width: 700px;
  margin: 0 auto;
  padding: 20px 16px;
}

.section { display: none; }
.section.active { display: block; }

h2 {
  font-size: 1.4rem;
  margin-bottom: 16px;
  color: var(--primary);
}

/* CATEGORY SELECTOR */
.category-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}

.cat-btn {
  padding: 6px 14px;
  border: 2px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 500;
}
.cat-btn:hover { border-color: var(--primary-light); }
.cat-btn.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* FLASHCARD */
.flashcard-container {
  perspective: 1000px;
  margin-bottom: 20px;
}

.flashcard {
  width: 100%;
  min-height: 220px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s;
}
.flashcard.flipped { transform: rotateY(180deg); }

.flashcard-face {
  position: absolute;
  width: 100%;
  min-height: 220px;
  backface-visibility: hidden;
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  box-shadow: var(--shadow);
}

.flashcard-front {
  background: var(--card);
  border: 2px solid var(--border);
}

.flashcard-back {
  background: var(--primary);
  color: white;
  transform: rotateY(180deg);
}

.flashcard-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
  opacity: 0.6;
}

.flashcard-word {
  font-size: 2rem;
  font-weight: 700;
  text-align: center;
  line-height: 1.3;
}

.flashcard-extra {
  font-size: 0.9rem;
  margin-top: 10px;
  opacity: 0.8;
  text-align: center;
}

.flashcard-hint {
  font-size: 0.75rem;
  margin-top: 16px;
  opacity: 0.4;
}

.flashcard-nav {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: center;
}

.fc-btn {
  padding: 10px 24px;
  border: none;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}

.fc-btn-prev, .fc-btn-next {
  background: var(--primary);
  color: white;
}
.fc-btn-prev:hover, .fc-btn-next:hover {
  background: var(--primary-light);
}
.fc-btn-shuffle {
  background: var(--warning);
  color: white;
}

.fc-counter {
  font-size: 0.85rem;
  color: var(--text-light);
  font-weight: 500;
  min-width: 60px;
  text-align: center;
}

.fc-direction {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}

.dir-btn {
  padding: 6px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  background: var(--card);
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 500;
}
.dir-btn.active {
  background: var(--primary-light);
  color: white;
  border-color: var(--primary-light);
}

/* QUIZ */
.quiz-question {
  background: var(--card);
  border-radius: 16px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  text-align: center;
}

.quiz-prompt-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-light);
  margin-bottom: 8px;
}

.quiz-prompt {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 4px;
}

.quiz-context {
  font-size: 0.85rem;
  color: var(--text-light);
}

.quiz-options {
  display: grid;
  gap: 10px;
  margin-bottom: 16px;
}

.quiz-option {
  padding: 14px 20px;
  border: 2px solid var(--border);
  border-radius: 12px;
  background: var(--card);
  font-size: 1rem;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  font-weight: 500;
}
.quiz-option:hover { border-color: var(--primary-light); background: #f0f7ff; }
.quiz-option.correct {
  border-color: var(--success);
  background: #d5f5e3;
  color: var(--success);
}
.quiz-option.wrong {
  border-color: var(--accent);
  background: #fadbd8;
  color: var(--accent);
}
.quiz-option.disabled { pointer-events: none; }

.quiz-score {
  text-align: center;
  padding: 12px;
  background: var(--card);
  border-radius: 12px;
  box-shadow: var(--shadow);
  margin-bottom: 12px;
}

.quiz-score-num {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--primary);
}

.quiz-next-btn {
  display: block;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  background: var(--primary);
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}
.quiz-next-btn:hover { background: var(--primary-light); }

/* CONJUGATION TRAINER */
.conj-card {
  background: var(--card);
  border-radius: 16px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  text-align: center;
}

.conj-verb {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary);
}

.conj-english {
  font-size: 0.9rem;
  color: var(--text-light);
  margin-bottom: 16px;
}

.conj-pronoun {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 16px;
}

.conj-input-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 12px;
}

.conj-input {
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 1.1rem;
  text-align: center;
  width: 240px;
  outline: none;
  transition: border-color 0.2s;
}
.conj-input:focus { border-color: var(--primary-light); }
.conj-input.correct { border-color: var(--success); background: #d5f5e3; }
.conj-input.wrong { border-color: var(--accent); background: #fadbd8; }

.conj-check-btn {
  padding: 12px 28px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
}

.conj-feedback {
  margin-top: 12px;
  font-size: 1rem;
  font-weight: 600;
  min-height: 24px;
}

.conj-streak {
  text-align: center;
  margin-bottom: 16px;
  font-size: 0.9rem;
  color: var(--text-light);
}

.conj-streak span {
  font-weight: 700;
  color: var(--primary);
}

/* CASE TRAINER */
.case-card {
  background: var(--card);
  border-radius: 16px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
  text-align: center;
}

.case-name {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary-light);
  margin-bottom: 4px;
}

.case-prompt {
  font-size: 1.2rem;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.5;
}

.case-prompt strong {
  color: var(--accent);
  font-size: 1.4rem;
}

.case-hint {
  font-size: 0.8rem;
  color: var(--text-light);
  margin-bottom: 12px;
}

/* SENTENCE BUILDER */
.sb-card {
  background: var(--card);
  border-radius: 16px;
  padding: 30px;
  box-shadow: var(--shadow);
  margin-bottom: 16px;
}

.sb-english {
  font-size: 1rem;
  color: var(--text-light);
  margin-bottom: 12px;
  text-align: center;
}

.sb-sentence {
  font-size: 1.3rem;
  text-align: center;
  margin-bottom: 16px;
  line-height: 1.8;
}

.sb-blank {
  display: inline-block;
  border-bottom: 3px solid var(--primary-light);
  min-width: 100px;
  padding: 2px 4px;
  margin: 0 4px;
}

.sb-input {
  padding: 12px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 1.1rem;
  text-align: center;
  width: 100%;
  max-width: 300px;
  display: block;
  margin: 0 auto 12px;
  outline: none;
}
.sb-input:focus { border-color: var(--primary-light); }
.sb-input.correct { border-color: var(--success); background: #d5f5e3; }
.sb-input.wrong { border-color: var(--accent); background: #fadbd8; }

/* SHARED UTILITY */
.text-success { color: var(--success); }
.text-error { color: var(--accent); }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }

.btn-row {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-top: 16px;
}

/* RESPONSIVE */
@media (max-width: 480px) {
  .flashcard-word { font-size: 1.5rem; }
  .quiz-prompt { font-size: 1.4rem; }
  .nav-tab { padding: 10px 12px; font-size: 0.8rem; }
  main { padding: 16px 12px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-title">Serbian Learning</div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-section="flashcards">Flashcards</button>
    <button class="nav-tab" data-section="quiz">Quiz</button>
    <button class="nav-tab" data-section="conjugation">Conjugation</button>
    <button class="nav-tab" data-section="cases">Cases</button>
    <button class="nav-tab" data-section="sentences">Sentences</button>
  </div>
</nav>

<main>

  <!-- FLASHCARDS -->
  <div id="flashcards" class="section active">
    <h2>Flashcards</h2>
    <div class="category-bar" id="fc-categories"></div>
    <div class="fc-direction">
      <button class="dir-btn active" data-dir="en-sr">English &rarr; Serbian</button>
      <button class="dir-btn" data-dir="sr-en">Serbian &rarr; English</button>
    </div>
    <div class="flashcard-container">
      <div class="flashcard" id="flashcard" onclick="flipCard()">
        <div class="flashcard-face flashcard-front">
          <div class="flashcard-label" id="fc-front-label">English</div>
          <div class="flashcard-word" id="fc-front-word"></div>
          <div class="flashcard-extra" id="fc-front-extra"></div>
          <div class="flashcard-hint">Tap to flip</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <div class="flashcard-label" id="fc-back-label">Serbian</div>
          <div class="flashcard-word" id="fc-back-word"></div>
          <div class="flashcard-extra" id="fc-back-extra"></div>
        </div>
      </div>
    </div>
    <div class="flashcard-nav">
      <button class="fc-btn fc-btn-prev" onclick="fcPrev()">&larr; Prev</button>
      <span class="fc-counter" id="fc-counter">1 / 10</span>
      <button class="fc-btn fc-btn-next" onclick="fcNext()">Next &rarr;</button>
      <button class="fc-btn fc-btn-shuffle" onclick="fcShuffle()">Shuffle</button>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz" class="section">
    <h2>Quiz</h2>
    <div class="category-bar" id="quiz-categories"></div>
    <div class="quiz-score">
      Score: <span class="quiz-score-num" id="quiz-score">0 / 0</span>
    </div>
    <div class="quiz-question">
      <div class="quiz-prompt-label" id="quiz-label">Translate to Serbian</div>
      <div class="quiz-prompt" id="quiz-prompt"></div>
      <div class="quiz-context" id="quiz-context"></div>
    </div>
    <div class="quiz-options" id="quiz-options"></div>
    <button class="quiz-next-btn" id="quiz-next" onclick="quizNext()" style="display:none">Next Question &rarr;</button>
  </div>

  <!-- CONJUGATION -->
  <div id="conjugation" class="section">
    <h2>Conjugation Trainer</h2>
    <div class="conj-streak">
      Streak: <span id="conj-streak">0</span> | Best: <span id="conj-best">0</span>
    </div>
    <div class="conj-card">
      <div class="conj-verb" id="conj-verb"></div>
      <div class="conj-english" id="conj-english"></div>
      <div class="conj-pronoun" id="conj-pronoun"></div>
      <div class="conj-input-row">
        <input type="text" class="conj-input" id="conj-input" placeholder="Type conjugation..." autocomplete="off" autocapitalize="off">
        <button class="conj-check-btn" onclick="conjCheck()">Check</button>
      </div>
      <div class="conj-feedback" id="conj-feedback"></div>
    </div>
    <div class="btn-row">
      <button class="fc-btn fc-btn-next" onclick="conjNext()">Skip &rarr;</button>
    </div>
  </div>

  <!-- CASES -->
  <div id="cases" class="section">
    <h2>Case Trainer</h2>
    <div class="category-bar" id="case-categories"></div>
    <div class="conj-streak">
      Score: <span id="case-score">0</span> / <span id="case-total">0</span>
    </div>
    <div class="case-card">
      <div class="case-name" id="case-name"></div>
      <div class="case-prompt" id="case-prompt"></div>
      <div class="case-hint" id="case-hint"></div>
      <div class="conj-input-row">
        <input type="text" class="conj-input" id="case-input" placeholder="Type answer..." autocomplete="off" autocapitalize="off">
        <button class="conj-check-btn" onclick="caseCheck()">Check</button>
      </div>
      <div class="conj-feedback" id="case-feedback"></div>
    </div>
    <div class="btn-row">
      <button class="fc-btn fc-btn-next" onclick="caseNext()">Skip &rarr;</button>
    </div>
  </div>

  <!-- SENTENCES -->
  <div id="sentences" class="section">
    <h2>Sentence Builder</h2>
    <div class="conj-streak">
      Score: <span id="sb-score">0</span> / <span id="sb-total">0</span>
    </div>
    <div class="sb-card">
      <div class="sb-english" id="sb-english"></div>
      <div class="sb-sentence" id="sb-sentence"></div>
      <input type="text" class="sb-input" id="sb-input" placeholder="Fill in the blank..." autocomplete="off" autocapitalize="off">
      <div class="btn-row">
        <button class="conj-check-btn" onclick="sbCheck()">Check</button>
      </div>
      <div class="conj-feedback" id="sb-feedback"></div>
    </div>
    <div class="btn-row">
      <button class="fc-btn fc-btn-next" onclick="sbNext()">Skip &rarr;</button>
    </div>
  </div>

</main>

// UTILITIES
// =============================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pick(arr, n, exclude) {
  const filtered = exclude ? arr.filter(x => x !== exclude) : [...arr];
  return shuffle(filtered).slice(0, n);
}

function normalize(str) {
  return str.trim().toLowerCase();
}

// =============================================
let fcCategory = Object.keys(DATA.vocabulary)[0];
let fcCards = [];
let fcIndex = 0;
let fcDir = 'en-sr';

function initFlashcards() {
  const bar = document.getElementById('fc-categories');
  bar.innerHTML = '';
  Object.keys(DATA.vocabulary).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === fcCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      fcCategory = cat;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      loadFcCards();
    };
    bar.appendChild(btn);
  });
  loadFcCards();
}

function loadFcCards() {
  fcCards = [...DATA.vocabulary[fcCategory]];
  fcIndex = 0;
  showFcCard();
}

function showFcCard() {
  if (!fcCards.length) return;
  const card = fcCards[fcIndex];
  const el = document.getElementById('flashcard');
  el.classList.remove('flipped');

  const frontLabel = document.getElementById('fc-front-label');
  const frontWord = document.getElementById('fc-front-word');
  const backLabel = document.getElementById('fc-back-label');
  const backWord = document.getElementById('fc-back-word');

  if (fcDir === 'en-sr') {
    frontLabel.textContent = 'English';
    frontWord.textContent = card.en;
    backLabel.textContent = 'Serbian';
    backWord.textContent = card.sr;
  } else {
    frontLabel.textContent = 'Serbian';
    frontWord.textContent = card.sr;
    backLabel.textContent = 'English';
    backWord.textContent = card.en;
  }

  document.getElementById('fc-counter').textContent = `${fcIndex + 1} / ${fcCards.length}`;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function fcNext() {
  fcIndex = (fcIndex + 1) % fcCards.length;
  showFcCard();
}

function fcPrev() {
  fcIndex = (fcIndex - 1 + fcCards.length) % fcCards.length;
  showFcCard();
}

function fcShuffle() {
  fcCards = shuffle(fcCards);
  fcIndex = 0;
  showFcCard();
}

document.querySelectorAll('.dir-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fcDir = btn.dataset.dir;
    showFcCard();
  });
});

// QUIZ
// =============================================
let quizCategory = Object.keys(DATA.vocabulary)[0];
let quizPool = [];
let quizCorrect = 0;
let quizTotal = 0;
let quizAnswered = false;

function initQuiz() {
  const bar = document.getElementById('quiz-categories');
  bar.innerHTML = '';
  const cats = ['All', ...Object.keys(DATA.vocabulary)];
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === quizCategory ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      quizCategory = cat;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      quizCorrect = 0;
      quizTotal = 0;
      loadQuiz();
    };
    bar.appendChild(btn);
  });
  quizCategory = 'All';
  bar.querySelector('.cat-btn').classList.add('active');
  loadQuiz();
}

function getQuizPool() {
  if (quizCategory === 'All') {
    return Object.values(DATA.vocabulary).flat();
  }
  return DATA.vocabulary[quizCategory];
}

function loadQuiz() {
  quizAnswered = false;
  document.getElementById('quiz-next').style.display = 'none';
  const pool = getQuizPool();
  if (pool.length < 4) return;

  const correct = pool[Math.floor(Math.random() * pool.length)];
  const direction = Math.random() > 0.5 ? 'en-sr' : 'sr-en';

  const promptEl = document.getElementById('quiz-prompt');
  const labelEl = document.getElementById('quiz-label');
  const contextEl = document.getElementById('quiz-context');

  if (direction === 'en-sr') {
    labelEl.textContent = 'Translate to Serbian';
    promptEl.textContent = correct.en;
    contextEl.textContent = '';
  } else {
    labelEl.textContent = 'Translate to English';
    promptEl.textContent = correct.sr;
    contextEl.textContent = '';
  }

  const wrongChoices = pick(pool, 3, correct);
  const options = shuffle([correct, ...wrongChoices]);

  const optionsEl = document.getElementById('quiz-options');
  optionsEl.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-option';
    btn.textContent = direction === 'en-sr' ? opt.sr : opt.en;
    btn.onclick = () => handleQuizAnswer(btn, opt === correct, direction === 'en-sr' ? correct.sr : correct.en);
    optionsEl.appendChild(btn);
  });

  document.getElementById('quiz-score').textContent = `${quizCorrect} / ${quizTotal}`;
}

function handleQuizAnswer(btn, isCorrect, correctAnswer) {
  if (quizAnswered) return;
  quizAnswered = true;
  quizTotal++;

  document.querySelectorAll('.quiz-option').forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    quizCorrect++;
    btn.classList.add('correct');
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.quiz-option').forEach(b => {
      if (b.textContent === correctAnswer) b.classList.add('correct');
    });
  }

  document.getElementById('quiz-score').textContent = `${quizCorrect} / ${quizTotal}`;
  document.getElementById('quiz-next').style.display = 'block';
}

function quizNext() {
  loadQuiz();
}

// =============================================
// CONJUGATION TRAINER
// =============================================
const PRONOUNS = ['ja', 'ti', 'on/ona/ono', 'mi', 'vi/Vi', 'oni'];
let conjStreak = 0;
let conjBest = 0;
let conjCurrent = null;

function loadConj() {
  const verb = DATA.verbs[Math.floor(Math.random() * DATA.verbs.length)];
  const pronoun = PRONOUNS[Math.floor(Math.random() * PRONOUNS.length)];
  conjCurrent = { verb, pronoun, answer: verb.conj[pronoun] };

  document.getElementById('conj-verb').textContent = verb.inf;
  document.getElementById('conj-english').textContent = verb.en;
  document.getElementById('conj-pronoun').textContent = pronoun;
  document.getElementById('conj-input').value = '';
  document.getElementById('conj-input').className = 'conj-input';
  document.getElementById('conj-feedback').textContent = '';
  document.getElementById('conj-input').focus();
}

function conjCheck() {
  if (!conjCurrent) return;
  const input = document.getElementById('conj-input');
  const fb = document.getElementById('conj-feedback');
  const userAnswer = normalize(input.value);
  const correct = normalize(conjCurrent.answer);

  if (userAnswer === correct) {
    input.classList.add('correct');
    fb.innerHTML = '<span class="text-success">Correct!</span>';
    conjStreak++;
    if (conjStreak > conjBest) conjBest = conjStreak;
    setTimeout(loadConj, 800);
  } else {
    input.classList.add('wrong');
    fb.innerHTML = `<span class="text-error">Answer: ${conjCurrent.answer}</span>`;
    conjStreak = 0;
    setTimeout(loadConj, 1500);
  }

  document.getElementById('conj-streak').textContent = conjStreak;
  document.getElementById('conj-best').textContent = conjBest;
}

function conjNext() {
  conjStreak = 0;
  document.getElementById('conj-streak').textContent = 0;
  loadConj();
}

document.getElementById('conj-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') conjCheck();
});

// =============================================
// CASE TRAINER
// =============================================
let caseType = 'accusative';
let caseExercises = [];
let caseIndex = 0;
let caseScore = 0;
let caseTotalAnswered = 0;

function initCases() {
  const bar = document.getElementById('case-categories');
  bar.innerHTML = '';
  Object.keys(DATA.cases).forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c === caseType ? ' active' : '');
    btn.textContent = DATA.cases[c].name;
    btn.onclick = () => {
      caseType = c;
      bar.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      caseScore = 0;
      caseTotalAnswered = 0;
      loadCaseExercise();
    };
    bar.appendChild(btn);
  });
  loadCaseExercise();
}

function loadCaseExercise() {
  const caseData = DATA.cases[caseType];
  caseExercises = shuffle(caseData.exercises);
  caseIndex = 0;
  showCaseExercise();
}

function showCaseExercise() {
  if (!caseExercises.length) return;
  const ex = caseExercises[caseIndex % caseExercises.length];

  document.getElementById('case-name').textContent = DATA.cases[caseType].name + ' — ' + DATA.cases[caseType].usage;
  document.getElementById('case-prompt').innerHTML = `<strong>${ex.prompt}</strong>`;
  document.getElementById('case-hint').textContent = ex.hint;
  document.getElementById('case-input').value = '';
  document.getElementById('case-input').className = 'conj-input';
  document.getElementById('case-feedback').textContent = '';
  document.getElementById('case-score').textContent = caseScore;
  document.getElementById('case-total').textContent = caseTotalAnswered;
  document.getElementById('case-input').focus();
}

function caseCheck() {
  const input = document.getElementById('case-input');
  const fb = document.getElementById('case-feedback');
  const ex = caseExercises[caseIndex % caseExercises.length];
  const userAnswer = normalize(input.value);
  const correct = normalize(ex.answer);

  caseTotalAnswered++;

  if (userAnswer === correct) {
    input.classList.add('correct');
    fb.innerHTML = '<span class="text-success">Correct!</span>';
    caseScore++;
    setTimeout(() => { caseIndex++; showCaseExercise(); }, 800);
  } else {
    input.classList.add('wrong');
    fb.innerHTML = `<span class="text-error">Answer: ${ex.answer}</span>`;
    setTimeout(() => { caseIndex++; showCaseExercise(); }, 1500);
  }

  document.getElementById('case-score').textContent = caseScore;
  document.getElementById('case-total').textContent = caseTotalAnswered;
}

function caseNext() {
  caseIndex++;
  showCaseExercise();
}

document.getElementById('case-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') caseCheck();
});

// =============================================
// SENTENCE BUILDER

let sbExercises = [];

function sbCheck() {

  const fb = document.getElementById('sb-feedback');
  const ex = sbExercises[sbIndex % sbExercises.length];
  const userAnswer = normalize(input.value);

  sbTotalAnswered++;

  if (userAnswer === correct) {
    input.classList.add('correct');
    fb.innerHTML = '<span class="text-success">Correct!</span>';

function sbNext() {

}

document.getElementById('sb-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sbCheck();

// =============================================

initFlashcards();
initQuiz();
loadConj();
initCases();
initSentences();
